<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legacy: The Perfect Human</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-panel controls">
        <div style="font-weight: 900; font-size: 18px; margin-bottom: 5px;">🧬 유전자 시뮬레이터</div>
        <div id="year-ui">가문 창시 중...</div>
        <div id="pop-ui" style="font-size: 13px; color: #2c3e50;">인구: 1명</div>
        <div id="asset-ui" style="font-size: 13px; color: #2c3e50;">자산: 1000만원</div>
        <div class="speed-grid">
            <button class="speed-btn stop" onclick="setSpeed(0, this)">정지</button>
            <button class="speed-btn active" onclick="setSpeed(1, this)">x1</button>
            <button class="speed-btn" onclick="setSpeed(5, this)">x5</button>
            <button class="speed-btn" onclick="setSpeed(15, this)">x15</button>
            <button class="speed-btn" onclick="setSpeed(50, this)">x50</button>
        </div>
        <button id="auto-choice-btn" onclick="toggleAutoChoice()" style="margin-top:6px; width:100%; padding:5px 0; border:none; border-radius:6px; background:#636e72; color:#fff; font-weight:bold; cursor:pointer; font-size:12px;">🤖 자동선택: OFF</button>
        <button id="admin-toggle-btn" onclick="toggleAdminPanel()" style="margin-top:4px; width:100%; padding:5px 0; border:none; border-radius:6px; background:#2d3436; color:#fff; font-weight:bold; cursor:pointer; font-size:12px;">🔧 관리자</button>
        <div class="volume-control">
            <button id="mute-btn" onclick="toggleMute()">🔊</button>
            <input id="volume-slider" type="range" min="0" max="100" value="40" oninput="setVolume(this.value)">
        </div>
    </div>

    <div id="event-modal">
        <h2 id="e-title">이벤트</h2>
        <p id="e-desc">설명</p>
        <div id="choices-container"></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="total-asset-ui"></div>

    <div id="status-modal">
        <button id="status-close-btn" onclick="closeStatus()">✕</button>
        <div id="status-content"></div>
    </div>

    <audio id="bgm-main" src="sounds/Main%20bgm(Ghibli%20Station%20-%20The%20Mini%20Vandals).mp3" loop></audio>

    <!-- 관리자 패널 -->
    <div id="admin-panel" style="display:none;">
        <div class="admin-header">
            <span>🔧 관리자 메뉴</span>
            <button onclick="toggleAdminPanel()" class="admin-close">✕</button>
        </div>
        <div class="admin-section">
            <div class="admin-label">성별</div>
            <div class="admin-row">
                <button class="admin-opt active" data-key="gender" data-val="F" onclick="adminSelect(this)">여</button>
                <button class="admin-opt" data-key="gender" data-val="M" onclick="adminSelect(this)">남</button>
            </div>
        </div>
        <div class="admin-section">
            <div class="admin-label">얼굴 (face)</div>
            <div class="admin-row" id="admin-face"></div>
        </div>
        <div class="admin-section">
            <div class="admin-label">눈 (eyes)</div>
            <div class="admin-row" id="admin-eyes"></div>
        </div>
        <div class="admin-section">
            <div class="admin-label">코 (nose)</div>
            <div class="admin-row" id="admin-nose"></div>
        </div>
        <div class="admin-section">
            <div class="admin-label">입 (mouth)</div>
            <div class="admin-row" id="admin-mouth"></div>
        </div>
        <div class="admin-section">
            <div class="admin-label">앞머리 (frontHair)</div>
            <div class="admin-row" id="admin-frontHair"></div>
        </div>
        <div class="admin-section">
            <div class="admin-label">옷 (clothes)</div>
            <div class="admin-row" id="admin-clothes"></div>
        </div>
        <div class="admin-section">
            <div class="admin-label">어깨 (shoulder)</div>
            <div class="admin-row" id="admin-shoulder"></div>
        </div>
        <div id="admin-result" style="display:none;"></div>
        <button class="admin-spawn-btn" onclick="adminSpawn()">🎮 캐릭터 소환</button>
    </div>

    <script src="Person.js?v=35"></script>
    <script src="events.js?v=3"></script>
    <script src="jobDefinitions.js?v=1"></script>
    <script src="traitsData.js?v=1"></script>
    <script src="financeSystem.js?v=1"></script>
    <script src="eventEngine.js?v=1"></script>
    <script src="game.js?v=31"></script>
</body>
</html>
